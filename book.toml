[book]
title = "Agent Memory Patterns"
authors = ["Ratnopam Chakrabarti"]
language = "en"
src = "src"
description = "Architecture and design patterns for persistent AI agent memory"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
