name: Build and Release PDF

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-recommended texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra lmodern

      - name: Combine chapters with page breaks
        run: |
          BREAK=$'\n\\newpage\n'
          {
            cat src/introduction.md
            echo "$BREAK"
            cat src/ch01-context-is-not-memory.md
            echo "$BREAK"
            cat src/ch02-landscape.md
            echo "$BREAK"
            cat src/ch03-five-questions.md
            echo "$BREAK"
            cat src/ch04-memory-formation.md
            echo "$BREAK"
            cat src/ch05-cross-session.md
            echo "$BREAK"
            cat src/ch06-scoring-lifecycle.md
            echo "$BREAK"
            cat src/ch07-infrastructure-design.md
            echo "$BREAK"
            cat src/ch08-case-study.md
            echo "$BREAK"
            cat src/references.md
          } > full-book.md
          # Fix image paths (src/images/ -> src/images/ relative to repo root)
          sed -i 's|images/|src/images/|g' full-book.md

      - name: Build PDF
        run: |
          pandoc full-book.md -o agent-memory-patterns.pdf \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=1 \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V monofont="DejaVu Sans Mono" \
            -V title="Agent Memory Patterns" \
            -V subtitle="Architecture and Design for Persistent AI Agent Memory" \
            -V author="Ratnopam Chakrabarti" \
            -V date="$(date +'%B %Y')"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-memory-patterns.pdf
          generate_release_notes: true
